{{- if .Values.features.ui }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: ui }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ui }
    spec:
      containers:
        - name: ui
          image: {{ .Values.global.registry }}/{{ .Values.ui.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports: [{ name: http, containerPort: 8501 }]
          env:
            - { name: RAG_API_URL, value: "http://rag-api:8000" }
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.externalAccess.type }}
  selector: { app.kubernetes.io/name: ui }
  ports: [{ name: http, port: 8501, targetPort: 8501 }]
{{- end }}
