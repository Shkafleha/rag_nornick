apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-redis
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: langfuse-redis }
  template:
    metadata:
      labels: { app.kubernetes.io/name: langfuse-redis }
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: llm-secrets, key: REDIS_PASSWORD } }
          ports: [{ name: redis, containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-redis
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app.kubernetes.io/name: langfuse-redis }
  ports: [{ name: redis, port: 6379, targetPort: 6379 }]
