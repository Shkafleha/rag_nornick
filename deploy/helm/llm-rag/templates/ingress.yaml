{{- if .Values.features.ingress }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-rag
  namespace: {{ .Values.global.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- if .Values.features.ui }}
    - host: {{ .Values.ingress.hosts.ui }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: ui, port: { number: 8501 } } }
    {{- end }}
    - host: {{ .Values.ingress.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: rag-api, port: { number: 8000 } } }
    {{- if .Values.features.langfuse }}
    - host: {{ .Values.ingress.hosts.langfuse }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: langfuse-web, port: { number: 3000 } } }
    {{- end }}
    {{- if .Values.features.notebook }}
    - host: {{ .Values.ingress.hosts.notebook }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: notebook, port: { number: 8888 } } }
    {{- end }}
{{- end }}
