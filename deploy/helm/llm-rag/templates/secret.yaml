apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
  HF_TOKEN: {{ .Values.secrets.hfToken | quote }}
  CLEARML_API_ACCESS_KEY: {{ .Values.secrets.clearmlAccessKey | quote }}
  CLEARML_API_SECRET_KEY: {{ .Values.secrets.clearmlSecretKey | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
