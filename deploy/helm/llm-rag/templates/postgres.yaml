apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: postgres }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports: [{ name: pg, containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: "{{ .Values.postgres.user }}" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: llm-secrets, key: POSTGRES_PASSWORD } }
            - { name: POSTGRES_DB, value: "{{ .Values.postgres.db }}" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "{{ .Values.postgres.user }}"] }
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app.kubernetes.io/name: postgres }
  ports: [{ name: pg, port: 5432, targetPort: 5432 }]
