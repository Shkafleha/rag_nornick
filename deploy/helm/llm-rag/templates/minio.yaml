apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: minio }
  template:
    metadata:
      labels: { app.kubernetes.io/name: minio }
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          command: ["sh", "-c"]
          args:
            - mkdir -p /data/langfuse && minio server /data --console-address ":9001"
          env:
            - { name: MINIO_ROOT_USER, value: "{{ .Values.minio.rootUser }}" }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: llm-secrets, key: MINIO_ROOT_PASSWORD } }
          ports:
            - { name: api,     containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: minio-data } }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app.kubernetes.io/name: minio }
  ports:
    - { name: api,     port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
