apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: qdrant }
  template:
    metadata:
      labels: { app.kubernetes.io/name: qdrant }
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image }}
          ports:
            - { name: http, containerPort: 6333 }
            - { name: grpc, containerPort: 6334 }
          volumeMounts:
            - { name: storage, mountPath: /qdrant/storage }
          readinessProbe:
            httpGet: { path: /readyz, port: 6333 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim: { claimName: qdrant-storage }
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app.kubernetes.io/name: qdrant }
  ports:
    - { name: http, port: 6333, targetPort: 6333 }
    - { name: grpc, port: 6334, targetPort: 6334 }
