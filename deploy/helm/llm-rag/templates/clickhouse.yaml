apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: clickhouse }
  template:
    metadata:
      labels: { app.kubernetes.io/name: clickhouse }
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image }}
          ports:
            - { name: http, containerPort: 8123 }
            - { name: native, containerPort: 9000 }
          env:
            - { name: CLICKHOUSE_DB,   value: default }
            - { name: CLICKHOUSE_USER, value: "{{ .Values.clickhouse.user }}" }
            - name: CLICKHOUSE_PASSWORD
              valueFrom: { secretKeyRef: { name: llm-secrets, key: CLICKHOUSE_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/clickhouse }
            - { name: logs, mountPath: /var/log/clickhouse-server }
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: clickhouse-data } }
        - { name: logs, persistentVolumeClaim: { claimName: clickhouse-logs } }
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app.kubernetes.io/name: clickhouse }
  ports:
    - { name: http,   port: 8123, targetPort: 8123 }
    - { name: native, port: 9000, targetPort: 9000 }
