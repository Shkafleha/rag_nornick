{{- if .Values.features.notebook }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notebook
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: notebook }
  template:
    metadata:
      labels: { app.kubernetes.io/name: notebook }
    spec:
      runtimeClassName: nvidia
      containers:
        - name: notebook
          image: {{ .Values.global.registry }}/{{ .Values.notebook.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["jupyter","notebook","--ip=0.0.0.0","--port=8888","--no-browser","--allow-root","--NotebookApp.token=","--NotebookApp.password="]
          workingDir: /workspace
          ports: [{ name: http, containerPort: 8888 }]
          env:
            - { name: EMBEDDINGS_API_URL, value: "http://embeddings:8080" }
            - name: POSTGRES_URI
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.db }}"
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: llm-secrets, key: POSTGRES_PASSWORD } }
            - name: HF_TOKEN
              valueFrom: { secretKeyRef: { name: llm-secrets, key: HF_TOKEN } }
            - name: CLEARML_API_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: llm-secrets, key: CLEARML_API_ACCESS_KEY } }
            - name: CLEARML_API_SECRET_KEY
              valueFrom: { secretKeyRef: { name: llm-secrets, key: CLEARML_API_SECRET_KEY } }
          resources:
            limits: { nvidia.com/gpu: 1 }
          volumeMounts:
            - { name: workspace,    mountPath: /workspace }
            - { name: hf-cache,     mountPath: /root/.cache/huggingface }
            - { name: paddlex,      mountPath: /root/.paddlex }
      volumes:
        - name: workspace
          hostPath: { path: {{ .Values.global.hostCachePath }}/workspace, type: DirectoryOrCreate }
        - name: hf-cache
          hostPath: { path: {{ .Values.global.hostCachePath }}/hf-cache, type: DirectoryOrCreate }
        - name: paddlex
          hostPath: { path: {{ .Values.global.hostCachePath }}/paddlex,  type: DirectoryOrCreate }
---
apiVersion: v1
kind: Service
metadata:
  name: notebook
  namespace: {{ .Values.global.namespace }}
spec:
  selector: { app.kubernetes.io/name: notebook }
  ports: [{ name: http, port: 8888, targetPort: 8888 }]
{{- end }}
